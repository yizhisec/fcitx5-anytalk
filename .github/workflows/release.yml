name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # release notes need full history

      - name: Create GitHub Release with auto-generated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  aur:
    name: Publish to AUR
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render PKGBUILD with this tag's version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          sed "s/__PKGVER__/${VERSION}/" \
            packaging/aur/PKGBUILD.in > PKGBUILD
          echo "--- generated PKGBUILD ---"
          cat PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: fcitx5-anytalk
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email:    ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message:  "Update to ${{ github.ref_name }}"
          updpkgsums:      true   # auto-compute sha256
